general {
    lock_cmd = lock-screen                 # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = hyprctl dispatch "hl.dsp.dpms('on')" # Updated for Lua engine
    inhibit_sleep = 3                                      # wait until screen is locked
}

listener {
    timeout = 150                                             # 2.5min
    on-timeout = launch-hyprlock
}

listener {
    timeout = 300                      # 5min
    on-timeout = loginctl lock-session # lock screen when timeout has passed
}

listener {
    timeout = 420                                            # 7min
    on-timeout = hyprctl dispatch "hl.dsp.dpms('off')"       # Updated for Lua engine
    on-resume = hyprctl dispatch "hl.dsp.dpms('on')" && brightnessctl -r 
}

listener {
    timeout = 3600                                           # 1 hour
    on-timeout = cmd-shutdown                                # Shutdown in case I forgot it was on
}
